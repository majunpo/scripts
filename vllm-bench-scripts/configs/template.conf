# ============================================
# 配置文件模板
# ============================================
# 复制此文件并修改为你的测试场景
#
# 用法: ./run_bench_test.sh -c configs/your_config.conf
#
# 所有变量都可以通过命令行参数覆盖，例如:
#   ./run_bench_test.sh -c configs/your_config.conf -p 8080 -i 4096
# ============================================

# ---- 模型与服务 ----
MODEL="/path/to/your/model"
HOST="127.0.0.1"
PORT="9001"

# ---- 数据参数 ----
RANDOM_INPUT_LEN=2048
RANDOM_OUTPUT_LEN=1024
RANDOM_RANGE_RATIO=0.2

# ---- 日志目录（可选，默认 ./benchmark_logs）----
# LOGDIR="./benchmark_logs"

# ---- 测试参数组合 ----
# 格式: num-prompts:max-concurrency
# 建议：
#   - 短上下文 (<=4k):  并发可以开大，prompts 数量多
#   - 长上下文 (>=64k): 并发控制小，prompts 数量少
TEST_CONFIGS=(
  "10:1"
  "80:8"
  "160:16"
  "320:32"
  "400:64"
)
